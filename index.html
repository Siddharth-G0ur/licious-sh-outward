<head>

  <title>SH Outward — Licious Scan App</title>

  <style>
    :root {

      --radius-lg:12px;
    }
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;font:400 14px/1.6 var(--font-display);color:#2B2B2E;background:#0f0e1c;-webkit-font-smoothing:antialiased}

    .kit-stage{background:#0f0e1c;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:28px 16px;flex-direction:column;gap:16px}
    .kit-shell{width:380px;height:760px;background:#000;border-radius:38px;padding:8px;box-shadow:0 24px 80px rgba(0,0,0,.6),inset 0 0 0 1.5px #2a2a36;position:relative;flex-shrink:0}
    .kit-viewport{width:100%;height:100%;border-radius:32px;overflow:hidden;position:relative;background:#F8F8F8}
    .header-strip{color:rgba(255,255,255,.78);font:500 12px/1.4 var(--font-display);text-align:center;max-width:540px}
    .header-strip strong{color:#fff;font-weight:700}
    .header-strip .small{color:rgba(255,255,255,.45);font-size:11px;margin-top:4px;display:block}

    /* nav strip */
    .nav{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;padding:8px 12px;background:rgba(255,255,255,.04);border-radius:999px;max-width:720px}
    .nav button{background:transparent;border:1px solid rgba(255,255,255,.10);color:rgba(255,255,255,.75);padding:7px 11px;border-radius:999px;cursor:pointer;font:600 11px/1 var(--font-display);transition:all .15s;white-space:nowrap}
    .nav button:hover{color:#fff;border-color:rgba(255,255,255,.25)}
    .nav button.active{background:#D11243;color:#fff;border-color:#D11243}
    .nav .group{display:flex;gap:4px;padding:0 4px;border-left:1px solid rgba(255,255,255,.08);align-items:center}
    .nav .group:first-child{border-left:0;padding-left:0}
    .nav .group-label{font:700 9px/1 var(--font-display);letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.35);padding:6px 4px}

    /* chrome */

    .sb.light{color:#0D0D0E}.sb.dark{color:#fff}

    .sb .battery::after{content:"";position:absolute;left:1px;top:1px;bottom:1px;width:16px;background:currentColor;border-radius:1px}
    .appbar{height:56px;background:#fff;display:flex;align-items:center;padding:0 16px;box-shadow:0 3px 6px rgba(0,0,0,.05);flex-shrink:0}
    .appbar.dark{background:#252638;box-shadow:none;border-bottom:1px solid rgba(255,255,255,.10)}
    .appbar .title{font:700 18px/1 var(--font-display);color:#0D0D0E;margin:0 auto}
    .appbar.dark .title{color:#fff}
    .icon-btn{width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;color:#2B2B2E;background:none;border:0;cursor:pointer}
    .appbar.dark .icon-btn{color:#fff}

    /* layout */
    .screen{display:flex;flex-direction:column;height:100%}
    .body{flex:1;overflow-y:auto;min-height:0}
    .body.dark{background:#252638}.body.light{background:#F8F8F8}
    .action{background:#fff;padding:12px 16px 16px;box-shadow:0 -2px 8px rgba(0,0,0,.06);display:flex;gap:12px;flex-shrink:0}
    .action.dark{background:#252638;box-shadow:none;border-top:1px solid rgba(255,255,255,.10)}

    .btn{border:0;cursor:pointer;font:700 16px/1 var(--font-display);border-radius:12px;padding:0 20px;height:54px;flex:1;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:background .15s,transform .05s}

<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

/* ─────────────────────────────────────────
   LIVE-DATA HELPERS
   liveScans: { 'skuId:hubId': { scanned:number, submitted:bool } }
   These functions are the single source of truth for anything displayed.
───────────────────────────────────────── */
function hubKey(skuId,hubId){ return `${skuId}:${hubId}`; }

function liveHubScanned(live, skuId, hubId){
  const k = hubKey(skuId,hubId);
  return live[k]?.scanned ?? 0;
}

function liveSkuScanned(live, skuId){
  const sku = DATA.SKU_BY_ID[skuId];
  if(!sku) return 0;
  return +sku.hubs.reduce((a,h)=>a+liveHubScanned(live,skuId,h.id),0).toFixed(2);
}

function isSubmitted(live, skuId, hubId){
  return !!live[hubKey(skuId,hubId)]?.submitted;
}

// Derive hub status from live data
function hubStatus(live, skuId, hubId){
  if(isSubmitted(live,skuId,hubId)) return "submitted";
  const sc = liveHubScanned(live,skuId,hubId);
  const pl = DATA.SKU_BY_ID[skuId]?.hubs?.find(h=>h.id===hubId)?.plan ?? 0;
  if(sc >= pl && pl > 0) return "complete";
  if(sc > 0) return "progress";
  return "pending";
}

function skuStatus(live, skuId){
  const sku = DATA.SKU_BY_ID[skuId];
  const sc  = liveSkuScanned(live,skuId);
  if(sc >= sku.plan && sku.plan > 0) return "complete";
  if(sc > 0) return "progress";
  return "pending";
}

function StatusBar({theme="light"}){
  return(
    <div className={`sb ${theme}`}>
      <span>9:41</span>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <svg width="16" height="11" viewBox="0 0 24 16" fill="currentColor"><rect x="1" y="11" width="3" height="4" rx="1"/><rect x="6" y="8" width="3" height="7" rx="1"/><rect x="11" y="5" width="3" height="10" rx="1"/><rect x="16" y="2" width="3" height="13" rx="1"/></svg>
        <svg width="13" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 7c3.3 0 6.3 1.3 8.6 3.3l1.4-1.4C19.3 6.4 15.8 5 12 5S4.7 6.4 2 8.9l1.4 1.4C5.7 8.3 8.7 7 12 7zm0 4c2.2 0 4.2.9 5.7 2.3l1.4-1.4C17.2 10.1 14.7 9 12 9s-5.2 1.1-7.1 2.9l1.4 1.4C7.8 11.9 9.8 11 12 11z"/></svg>
        <div className="battery"/>
      </div>
    </div>

}

function AppBar({title,theme="light",onBack,right,subtitle}){
  return(
    <div className={`appbar${theme==="dark"?" dark":""}`}>
      {onBack&&<button className="icon-btn" onClick={onBack}><IBack/></button>}
      <div style={{margin:"0 auto",display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
        <div className="title" style={{margin:0}}>{title}</div>
        {subtitle&&<div style={{font:"500 11px/1 var(--font-display)",color:theme==="dark"?"rgba(255,255,255,.6)":"#62666A"}}>{subtitle}</div>}
      </div>
      {right??<button className="icon-btn"><IMore/></button>}
    </div>
  );
}

function Badge({kind="warn",dot=false,children}){
  return <span className={`badge badge-${kind}`}>{dot&&<span className="dot"/>}{children}</span>;
}

function StatusFlag({status}){
  const MAP={
    pending:  {kind:"grey",dot:false,label:"Pending"},
    progress: {kind:"warn",dot:true, label:"In Progress"},
    complete: {kind:"ok",  dot:false,label:"Complete"},
    submitted:{kind:"info",dot:false,label:"Submitted"},
  };
  const m=MAP[status]||MAP.pending;
  return <Badge kind={m.kind} dot={m.dot}>{m.label}</Badge>;
}

function Field({label,value,onChange,placeholder,type="text",inputMode,autoFocus,prefix}){
  const st=!value?"placeholder":"typed";
  return(
    <div>
      {label&&<div className="field-label">{label}</div>}
      <div className={`field-box ${st}`}>
        {prefix}
        <input type={type} inputMode={inputMode} value={value||""} onChange={e=>onChange&&onChange(e.target.value)} placeholder={placeholder} autoFocus={autoFocus}/>
      </div>
    </div>
  );
}

function Banner({kind="ok",title,body}){
  const M={
    ok:  {bg:"#F6FDF7",bd:"#1C9553",fg:"#0E8B45",icBg:"#12B75A",ic:<ICheck/>},
    warn:{bg:"#FFFEEC",bd:"#FFAA01",fg:"#EE8511",icBg:"#FFAA01",ic:<IAlert/>},
    err: {bg:"#FDF3F6",bd:"#D11243",fg:"#D11243",icBg:"#D11243",ic:<IClose/>},
    info:{bg:"#F0F9FF",bd:"#339AF0",fg:"#1C7ED6",icBg:"#339AF0",ic:<IAlert/>},
  };
  const m=M[kind];
  return(
    <div style={{background:m.bg,border:`1px solid ${m.bd}`,borderRadius:12,padding:"12px 14px",margin:"8px 0",display:"flex",alignItems:"center",gap:12,boxShadow:"4px 2px 11px rgba(0,0,0,.10)"}}>
      <div style={{width:32,height:32,borderRadius:"50%",flexShrink:0,background:m.icBg,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}}>{m.ic}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{font:"700 14px/1.3 var(--font-display)",color:m.fg}}>{title}</div>
        {body&&<div style={{font:"500 12px/1.4 var(--font-display)",color:"#62666A"}}>{body}</div>}
      </div>
    </div>
  );
}

function TypeTag({type}){
  return type==="free"
    ? <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:999,background:"#F0F9FF",color:"#1C7ED6",font:"700 10px/1 var(--font-display)"}}><IWeight style={{width:11,height:11}}/>Free wt</span>
    : <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:999,background:"#FFFBF0",color:"#9A6313",font:"700 10px/1 var(--font-display)"}}><ICount style={{width:11,height:11}}/>Fixed wt</span>;
}

function ConcurrencyPill({count}){
  if(!count) return null;
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:999,background:"rgba(51,154,240,.12)",color:"#1C7ED6",font:"700 10px/1 var(--font-display)"}}><IUsers style={{width:11,height:11}}/>{count} scanning</span>;
}

function CategoryRail({active,onChange,counts}){
  const items=[
    {id:"all",    label:"All",   Icon:ICatAll,    count:counts.all},
    {id:"chicken",label:"Chk",   Icon:ICatChicken,count:counts.chicken},
    {id:"mutton", label:"Mtn",   Icon:ICatMutton, count:counts.mutton},
    {id:"fs",     label:"F&S",   Icon:ICatFish,   count:counts.fs},
  ];
  return(
    <div className="cat-rail">
      {items.map(it=>{
        const on=active===it.id;
        return(
          <button key={it.id} className={`item${on?" active":""}`} onClick={()=>onChange(it.id)}>
            <div className="icon-box">
              <it.Icon style={{width:24,height:24}}/>
              {it.count>0&&<span className="badge-count">{it.count}</span>}
            </div>
            <span className="label">{it.label}</span>
          </button>
        );
      })}
    </div>
  );
}

function HubChips({hubs,active,onChange,counts}){
  return(
    <div className="tab-row">
      {hubs.map(h=>{
        const cnt=counts[h.id]??0;
        const on=active===h.id;
        return(
          <button key={h.id} onClick={()=>onChange(h.id)} className={`tab-chip${on?" active":""}`}>
            {h.label}
            {cnt>0&&<span className="pill">{cnt}</span>}
          </button>
        );
      })}
    </div>
  );
}

function OTPScreen({go,setUser,user}){
  const [digits,setDigits]=useState(["","","",""]);
  const refs=[useRef(),useRef(),useRef(),useRef()];
  const ready=digits.join("").length===4;
  useEffect(()=>{refs[0].current?.focus();},[]);
  function set(i,v){
    v=v.replace(/\D/g,"").slice(0,1);
    const n=[...digits];n[i]=v;setDigits(n);
    if(v&&i<3)refs[i+1].current?.focus();
  }
  return(
    <div className="screen">
      <StatusBar theme="light"/>
      <AppBar title="Verify OTP" onBack={()=>go("login")} right={<span style={{width:32}}/>}/>
      <div className="body light" style={{padding:"24px",display:"flex",flexDirection:"column",overflowY:"auto"}}>
        <div style={{font:"800 20px/1.3 var(--font-display)",color:"#0D0D0E"}}>Enter verification code</div>
        <div style={{font:"500 13px/1.5 var(--font-display)",color:"#62666A",marginTop:4}}>Sent to <strong style={{color:"#2B2B2E"}}>+91 98••••••41</strong></div>
        <div style={{marginTop:24,display:"flex",gap:10}}>
          {digits.map((d,i)=>(
            <input key={i} ref={refs[i]} value={d} maxLength={1} inputMode="numeric"
              onChange={e=>set(i,e.target.value)}
              onKeyDown={e=>{if(e.key==="Backspace"&&!d&&i>0)refs[i-1].current?.focus();}}
              style={{flex:1,minWidth:0,height:52,borderRadius:12,border:`1px solid ${d?"#2B2B2E":"#C0C1C3"}`,textAlign:"center",font:"800 22px/1 var(--font-display)",color:"#0D0D0E",outline:"none",background:"#fff"}}/>
          ))}
        </div>
        <div style={{marginTop:16,font:"500 13px/1.4 var(--font-display)",color:"#62666A",display:"flex",justifyContent:"space-between"}}>
          <span>Didn't get it?</span>
          <button style={{background:"none",border:0,color:"#1C7ED6",font:"700 13px/1 var(--font-display)",cursor:"pointer"}}>Resend in 0:24</button>
        </div>
        <div style={{flex:1,minHeight:12}}/>
        <div style={{padding:12,background:"#F8F8F8",borderRadius:10,font:"500 12px/1.5 var(--font-display)",color:"#62666A"}}>
          Demo: use OTP <strong style={{color:"#2B2B2E"}}>0000</strong> to sign in.
        </div>
      </div>
      <div className="action">
        <button className="btn btn-primary" disabled={!ready} onClick={()=>{setUser({...user,loggedIn:true,...DATA.USER});go("home");}}>Sign in</button>
      </div>
    </div>
  );
}

function HomeScreen({go,state,setState,live}){
  const cat=state.cat||"all";
  const hub=state.hub||"all";
  const [showSummary,setShowSummary]=React.useState(false);

  // Pending = at least one hub not submitted and scanned < plan
  function skuPending(sku){
    return sku.hubs.some(h=>!isSubmitted(live,sku.id,h.id)&&liveHubScanned(live,sku.id,h.id)<h.plan);
  }
  const counts={
    all:    DATA.SKUS.filter(s=>skuPending(s)).length,
    chicken:DATA.SKUS.filter(s=>s.cat==="chicken"&&skuPending(s)).length,
    mutton: DATA.SKUS.filter(s=>s.cat==="mutton" &&skuPending(s)).length,
    fs:     DATA.SKUS.filter(s=>s.cat==="fs"     &&skuPending(s)).length,
  };

  const hubsList=[{id:"all",label:"All hubs"},...DATA.HUBS];
  const hubCounts={all:counts.all};
  DATA.HUBS.forEach(h=>{
    hubCounts[h.id]=DATA.SKUS.filter(s=>s.hubs.some(hh=>hh.id===h.id&&!isSubmitted(live,s.id,h.id)&&liveHubScanned(live,s.id,h.id)<hh.plan)).length;
  });

  const skus=DATA.SKUS.filter(s=>{
    if(cat!=="all"&&s.cat!==cat)return false;
    if(hub!=="all"&&!s.hubs.some(hh=>hh.id===hub&&hh.plan>0))return false;
    return true;
  });

  const totalPlan   =DATA.SKUS.reduce((a,s)=>a+s.plan,0);
  const totalScanned=DATA.SKUS.reduce((a,s)=>a+liveSkuScanned(live,s.id),0);
  const overallPct  =totalPlan===0?0:Math.round((totalScanned/totalPlan)*100);

  // All hubs fully submitted?
  const allDone=DATA.HUBS.every(h=>DATA.SKUS.filter(s=>s.hubs.some(hh=>hh.id===h.id&&hh.plan>0)).every(s=>isSubmitted(live,s.id,h.id)));

  return(
    <div className="screen">
      <StatusBar theme="light"/>
      {/* header */}
      <div style={{background:"#fff",padding:"8px 16px",display:"flex",alignItems:"center",gap:10,boxShadow:"0 3px 6px rgba(0,0,0,.05)",flexShrink:0}}>
        <button onClick={()=>go("hubIdentity")} style={{background:"none",border:0,padding:0,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:"#252638",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",font:"700 14px/1 var(--font-display)",flexShrink:0}}>K</div>
          <div style={{textAlign:"left"}}>
            <div style={{font:"700 14px/1 var(--font-display)",color:"#0D0D0E"}}>BLR Retail SH</div>
            <div style={{font:"500 11px/1.3 var(--font-display)",color:"#62666A",marginTop:2}}>Kumar · Shift A · 14 May</div>
          </div>
        </button>
        <div style={{flex:1}}/>
        {DATA.USER.canSubmitOutward&&(
          <button onClick={()=>go("outwardSubmit")} className="icon-btn" style={{color:"#D11243"}} title="Submit Outward"><ICrown/></button>
        )}
        <button onClick={()=>setShowSummary(true)} className="icon-btn" style={{color:"#62666A"}} title="Summary"><IBarChart/></button>
        <button onClick={()=>go("login")} className="icon-btn" style={{color:"#62666A"}}><ILogout/></button>
      </div>

      {/* summary card */}
      <div style={{padding:"8px 16px 0",flexShrink:0,background:"#F8F8F8"}}>
        <div style={{background:"linear-gradient(135deg,#252638 0%,#414153 100%)",color:"#fff",borderRadius:10,padding:"10px 12px"}}>
          {/* top row: label + pct + badge */}
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{font:"500 9px/1 var(--font-display)",color:"rgba(255,255,255,.45)",letterSpacing:".08em",textTransform:"uppercase",flexShrink:0}}>SH OUTWARD · 14 MAY</div>
            <div style={{flex:1}}/>
            <div style={{font:"700 18px/1 var(--font-display)"}}>{overallPct}%<span style={{font:"500 11px/1 var(--font-display)",color:"rgba(255,255,255,.5)",marginLeft:4}}>scanned</span></div>
            <Badge kind={allDone?"ok":"dark"} style={{marginLeft:4}}>{allDone?"Done":"In Progress"}</Badge>
          </div>
          {/* progress bar */}
          <div className="progress dark" style={{marginTop:8,height:3}}><div className="ok" style={{width:`${overallPct}%`}}/></div>
          {/* stats row */}
          <div style={{display:"flex",gap:0,marginTop:8,paddingTop:8,borderTop:"1px solid rgba(255,255,255,.08)"}}>
            {[["SKUs",DATA.SKUS.length],["Hubs",DATA.HUBS.length],["Pending",counts.all]].map(([k,v])=>(
              <div key={k} style={{flex:1,display:"flex",alignItems:"baseline",gap:5}}>
                <span style={{font:"700 13px/1 var(--font-display)",color:k==="Pending"&&v>0?"#FFAA01":"#fff"}}>{v}</span>
                <span style={{font:"500 9px/1 var(--font-display)",color:"rgba(255,255,255,.4)",letterSpacing:".06em",textTransform:"uppercase"}}>{k}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* hub chips */}
      <HubChips hubs={hubsList} active={hub} onChange={id=>setState({...state,hub:id})} counts={hubCounts}/>

      {/* sidebar + list */}
      <div style={{flex:1,display:"flex",minHeight:0}}>
        <CategoryRail active={cat} onChange={id=>setState({...state,cat:id})} counts={counts}/>
        <div className="body light" style={{padding:"12px",overflowY:"auto",flex:1}}>
          <div style={{font:"700 11px/1 var(--font-display)",color:"#62666A",letterSpacing:".08em",textTransform:"uppercase",marginBottom:10,padding:"0 4px"}}>
            {skus.length} SKU{skus.length!==1?"s":""}
            {hub!=="all"?` · ${DATA.HUB_LABEL[hub]}`:""}
          </div>
          {skus.length===0&&<div style={{padding:"40px 16px",textAlign:"center",font:"500 13px/1.4 var(--font-display)",color:"#62666A"}}>No SKUs match.</div>}
          {skus.map(sku=>{
            const sc    =liveSkuScanned(live,sku.id);
            const status=skuStatus(live,sku.id);
            const over  =sc>sku.plan;
            return(
              <button key={sku.id} className="tap-card" onClick={()=>{
                const ns={...state,sku:sku.id};
                setState(ns);
                // If a specific hub is selected, skip the hub-list screen and scan directly
                if(hub!=="all"&&sku.hubs.some(h=>h.id===hub)){
                  go(sku.type==="free"?"scanFree":"scanFixed");
                }else{
                  go("skuDetail");
                }
              }} style={{marginBottom:10,padding:"12px 14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4}}>
                      <TypeTag type={sku.type}/>
                      {sku.activeUsers>0&&<ConcurrencyPill count={sku.activeUsers}/>}
                    </div>
                    <div style={{font:"700 14px/1.3 var(--font-display)",color:"#0D0D0E"}}>{sku.name}</div>
                  </div>
                  <StatusFlag status={status}/>
                </div>
                <div style={{display:"flex",alignItems:"baseline",gap:6,marginTop:10}}>
                  <span style={{font:"700 18px/1 var(--font-display)",color:over?"#D11243":"#0D0D0E"}}>{sku.uom==="kg"?sc.toFixed(1):sc}</span>
                  <span style={{font:"500 12px/1 var(--font-display)",color:"#62666A"}}>/ {sku.plan} {sku.uom}</span>

                const skusForHub=DATA.SKUS.filter(s=>s.hubs.some(hh=>hh.id===h.id&&hh.plan>0));
                const planTotal =skusForHub.reduce((a,s)=>{
                  const hh=s.hubs.find(x=>x.id===h.id);
                  return a+(hh?hh.plan:0);
                },0);
                const scTotal   =skusForHub.reduce((a,s)=>a+liveHubScanned(live,s.id,h.id),0);
                const submittedN=skusForHub.filter(s=>isSubmitted(live,s.id,h.id)).length;
                const allSub    =submittedN===skusForHub.length&&skusForHub.length>0;
                const pct       =planTotal===0?0:Math.min(100,Math.round((scTotal/planTotal)*100));
                const uomLabel  =skusForHub.some(s=>s.uom==="kg")?"kg":"u";
                return(
                  <div key={h.id} style={{marginBottom:10,padding:"10px 12px",background:"#F8F8F8",borderRadius:8}}>

                      </div>

                    <div style={{display:"flex",alignItems:"baseline",gap:4,marginBottom:6}}>
                      <span style={{font:"700 15px/1 var(--font-display)",color:"#0D0D0E"}}>{uomLabel==="kg"?scTotal.toFixed(1):scTotal}</span>

                      <span style={{font:"500 11px/1 var(--font-display)",color:"#62666A",marginLeft:"auto"}}>{pct}%</span>

                    <div style={{height:4,background:"#E9E9E9",borderRadius:999}}>
                      <div style={{height:"100%",borderRadius:999,background:allSub?"#12B75A":pct>0?"#FFAA01":"#E9E9E9",width:`${pct}%`}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ScanTarget({flashState}){
  const bc=flashState==="ok"?"#12B75A":flashState==="warn"?"#FFAA01":flashState==="err"?"#D11243":"rgba(255,255,255,.10)";
  return(
    <div style={{width:200,height:200,background:"#1a1a26",borderRadius:16,position:"relative",border:`2px solid ${bc}`,display:"flex",alignItems:"center",justifyContent:"center",transition:"border-color .2s",boxShadow:flashState!=="idle"?`0 0 20px ${bc}33`:"none"}}>
      {[[0,0],[1,0],[0,1],[1,1]].map(([x,y],i)=>(
        <div key={i} style={{position:"absolute",[x?"right":"left"]:12,[y?"bottom":"top"]:12,width:22,height:22,borderTop:!y?"3px solid #339AF0":"none",borderBottom:y?"3px solid #339AF0":"none",borderLeft:!x?"3px solid #339AF0":"none",borderRight:x?"3px solid #339AF0":"none",borderRadius:5}}/>
      ))}
      <div style={{position:"absolute",left:28,right:28,top:"50%",height:2,background:"#D11243",boxShadow:"0 0 10px #D11243",animation:"scanline 2s ease-in-out infinite alternate"}}/>
      <style>{`@keyframes scanline{from{transform:translateY(-70px)}to{transform:translateY(70px)}}`}</style>
    </div>
  );
}

/* Free weight scan — NO expiry for free-weight items */
function ScanFreeScreen({go,state,setState,live,commitScan}){
  const sku      =DATA.SKU_BY_ID[state.sku]||DATA.SKUS[0];
  const hubAlloc =sku.hubs.find(h=>h.id===state.hub)||sku.hubs[0];

  // Read the latest scanned value from live state as starting point
  const baseScanned=liveHubScanned(live,sku.id,hubAlloc.id);

  const [scans,  setScans]  =useState([]); // session additions
  const [flashSt,setFlashSt]=useState("idle");

  const sessionAdd=scans.reduce((a,s)=>a+s.weight,0);
  const total     =+(baseScanned+sessionAdd).toFixed(2);
  const plan      =hubAlloc.plan;
  const over      =total>plan;
  const pct       =Math.min(100,(total/plan)*100);

  function doScan(){
    const weight=+(Math.random()*1.2+0.4).toFixed(2);
    const bc=`890${String(Math.floor(1e8+Math.random()*8.9e8)).padStart(9,"0")}${String(Math.floor(1e4+Math.random()*8.9e4)).padStart(5,"0")}FW`;
    setScans(s=>[{barcode:bc,weight},...s].slice(0,10));
    setFlashSt((total+weight)>plan?"warn":"ok");
    setTimeout(()=>setFlashSt("idle"),700);
  }

  function handleBack(){
    // Save scan progress (not submitted) so it shows in SKU detail
    if(scans.length>0) commitScan(sku.id,hubAlloc.id,total,false);
    go("skuDetail");
  }

  function submitHub(){
    commitScan(sku.id,hubAlloc.id,total,true);
    setState(s=>({...s,lastHub:hubAlloc.id,lastScanned:total,lastPlan:plan,lastUom:sku.uom,lastSkuName:sku.name}));
    go("hubDone");
  }

  return(
    <div className="screen" style={{position:"relative"}}>
      <StatusBar theme="dark"/>
      <AppBar theme="dark" title={DATA.HUB_LABEL[hubAlloc.id]} onBack={handleBack} subtitle={sku.name}
        right={<button onClick={()=>setScans([])} className="icon-btn" style={{color:"#fff"}}><IRefresh/></button>}/>
      <div className="body dark" style={{display:"flex",flexDirection:"column"}}>
        <div style={{padding:"16px 20px 6px",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
          <div>
            <div style={{font:"500 10px/1 var(--font-display)",color:"rgba(255,255,255,.5)",letterSpacing:".08em",textTransform:"uppercase"}}>Scanned weight</div>
            <div style={{font:"800 44px/1 var(--font-display)",color:over?"#FF8FAB":"#fff",marginTop:6,fontVariantNumeric:"tabular-nums",transition:"color .2s"}}>{total.toFixed(1)}</div>
            <div style={{font:"500 11px/1 var(--font-display)",color:"rgba(255,255,255,.55)",marginTop:2}}>{sku.uom}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{font:"500 10px/1 var(--font-display)",color:"rgba(255,255,255,.5)",letterSpacing:".08em",textTransform:"uppercase"}}>Planned</div>
            <div style={{font:"700 22px/1 var(--font-display)",marginTop:6,color:"rgba(255,255,255,.85)"}}>{plan}<span style={{fontSize:12,color:"rgba(255,255,255,.5)",marginLeft:4}}>{sku.uom}</span></div>
            <div style={{font:"500 11px/1 var(--font-display)",color:"rgba(255,255,255,.5)",marginTop:4}}>{scans.length} pack{scans.length!==1?"s":""} this session</div>
          </div>
        </div>
        <div style={{padding:"0 20px 8px"}}>
          <div className="progress thick dark"><div className={over?"err":pct===100?"ok":"warn"} style={{width:`${pct}%`}}/></div>
          {over&&<Banner kind="err" title="Planned qty already met" body="Over planned dispatch — continue if needed."/>}
        </div>

        {/* Scan area with side trigger */}
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"8px 20px",gap:14}}>
          <ScanTarget flashState={flashSt}/>
          <button className="scan-side-btn" style={{height:200}} onClick={doScan} title="Tap to simulate scan">
            <IScan style={{width:22,height:22}}/><span>SCAN</span>
          </button>
        </div>

        {/* Last scan */}
        <div style={{padding:"4px 20px 8px",textAlign:"center"}}>
          {scans[0]
            ?<><div style={{font:"500 9px/1 var(--font-display)",color:"rgba(255,255,255,.4)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:3}}>Last scan</div>
               <div className="mono" style={{font:"700 11px/1.4 var(--font-display)",color:"#fff"}}>{scans[0].barcode}</div>
               <div style={{font:"500 11px/1.4 var(--font-display)",color:"#9CFFAF",marginTop:2}}>+ {scans[0].weight} kg</div></>
            :<div style={{font:"500 12px/1.4 var(--font-display)",color:"rgba(255,255,255,.4)"}}>33-digit PLU · weight auto-captured</div>
          }
        </div>
        {scans.length>1&&(
          <div style={{padding:"0 20px 8px",maxHeight:60,overflowY:"auto"}}>
            {scans.slice(1,4).map((s,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",font:"500 11px/1 var(--font-display)",color:"rgba(255,255,255,.45)",padding:"2px 0"}}>
                <span className="mono" style={{fontSize:10}}>•••{s.barcode.slice(-10)}</span>
                <span style={{color:"#9CFFAF"}}>+{s.weight} kg</span>
              </div>
            ))}
          </div>
        )}
      </div>
      <div className="action dark">
        <button className="btn btn-secondary" style={{flex:"none",padding:"0 14px",borderColor:"rgba(255,255,255,.2)",color:"#fff",background:"rgba(255,255,255,.06)"}} onClick={handleBack}>Back</button>
        <button className="btn btn-primary" onClick={submitHub}>Submit {DATA.HUB_LABEL[hubAlloc.id]}</button>
      </div>
    </div>
  );
}

/* Fixed weight scan */
function ScanFixedScreen({go,state,setState,live,commitScan}){
  const sku      =DATA.SKU_BY_ID[state.sku]||DATA.SKUS[0];
  const hubAlloc =sku.hubs.find(h=>h.id===state.hub)||sku.hubs[0];

  const baseScanned=liveHubScanned(live,sku.id,hubAlloc.id);

  const [scans,       setScans]      =useState([]);
  const [flashSt,     setFlashSt]    =useState("idle");
  const [pendingScan, setPendingScan]=useState(null);
  const [modal,       setModal]      =useState(null);

  const sessionAdd=scans.reduce((a,s)=>a+s.count,0);
  const total     =baseScanned+sessionAdd;
  const plan      =hubAlloc.plan;
  const over      =total>plan;
  const pct       =Math.min(100,(total/plan)*100);

  function doScan(){
    const r=Math.random();
    if(r<0.06){setFlashSt("err");setModal("expired");setTimeout(()=>setFlashSt("idle"),1200);return;}
    if(r<0.13){setFlashSt("warn");setModal("tolerance");setTimeout(()=>setFlashSt("idle"),1200);return;}
    setPendingScan({barcode:`${String(Math.floor(1e16+Math.random()*8.9e16)).slice(0,17)}`});
  }

  function confirmCount(count){
    if(pendingScan&&count>0){
      setScans(s=>[{barcode:pendingScan.barcode,count},...s].slice(0,10));
      setFlashSt((total+count)>plan?"warn":"ok");
      setTimeout(()=>setFlashSt("idle"),700);

    if(scans.length>0) commitScan(sku.id,hubAlloc.id,total,false);

  function submitHub(){
    commitScan(sku.id,hubAlloc.id,total,true);

            <div style={{font:"700 22px/1 var(--font-display)",marginTop:6,color:"rgba(255,255,255,.85)"}}>{plan}<span style={{fontSize:12,color:"rgba(255,255,255,.5)",marginLeft:4}}>u</span></div>
            <div style={{font:"500 11px/1 var(--font-display)",color:"rgba(255,255,255,.5)",marginTop:4}}>{scans.length} scan{scans.length!==1?"s":""} this session</div>
          </div>
        </div>
        <div style={{padding:"0 20px 8px"}}>
          <div className="progress thick dark"><div className={over?"err":pct===100?"ok":"warn"} style={{width:`${pct}%`}}/></div>

        </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            {[["Scanned",`${uom==="kg"?sc.toFixed(1):sc} ${uom}`,over?"#D11243":"#0E8B45"],

/* ─────────────────────────────────────────
   HUB SUBMIT (from Home action bar)
   Marks ALL SKU-hub pairs for that hub as submitted
───────────────────────────────────────── */
function HubSubmitScreen({go,state,live,commitScan}){
  const hubId=state.hub==="all"?DATA.HUBS[0].id:state.hub;
  const hub  =DATA.HUBS.find(h=>h.id===hubId);
  const rows =DATA.SKUS
    .map(s=>({sku:s,alloc:s.hubs.find(h=>h.id===hubId),sc:liveHubScanned(live,s.id,hubId)}))
    .filter(r=>r.alloc&&r.alloc.plan>0);

  const missed=rows.filter(r=>r.sc===0);
  const under =rows.filter(r=>r.sc>0&&r.sc<r.alloc.plan*0.9);
  const ready =rows.length>0&&missed.length===0;

  function doSubmit(){
    // Commit all rows for this hub as submitted (using current live scanned values)
    rows.forEach(r=>commitScan(r.sku.id,hubId,r.sc,true));
    go("home");
  }

  return(
    <div className="screen">
      <StatusBar theme="light"/>
      <AppBar title={`Submit ${hub.label}`} onBack={()=>go("home")}/>
      <div className="body light" style={{padding:"14px 16px"}}>
        <div style={{font:"800 22px/1.3 var(--font-display)",color:"#0D0D0E"}}>Lock {hub.label} outward</div>
        <div style={{font:"500 13px/1.5 var(--font-display)",color:"#62666A",marginTop:4}}>Submitting locks all SKU scans for this destination hub.</div>

        {missed.length>0&&(
          <div style={{marginTop:14,padding:14,background:"#FDF3F6",border:"1px solid #D11243",borderRadius:12}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <IAlert style={{color:"#D11243"}}/><div style={{font:"700 14px/1 var(--font-display)",color:"#D11243"}}>Missed dispatch · {missed.length} SKU{missed.length!==1?"s":""}</div>
            </div>
            <div style={{font:"500 12px/1.4 var(--font-display)",color:"#2B2B2E",marginBottom:10}}>Zero scans. <strong>Email alert will be sent on submit.</strong></div>
            {missed.map(r=>(
              <div key={r.sku.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",background:"#fff",borderRadius:6,marginTop:4,font:"500 12px/1 var(--font-display)"}}>
                <span style={{fontWeight:700}}>{r.sku.name}</span><span style={{color:"#D11243"}}>0 / {r.alloc.plan} {r.sku.uom}</span>
              </div>
            ))}
          </div>
        )}
        {under.length>0&&(
          <div style={{marginTop:12,padding:14,background:"#FFFEEC",border:"1px solid #FFAA01",borderRadius:12}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <IAlert style={{color:"#EE8511"}}/><div style={{font:"700 14px/1 var(--font-display)",color:"#EE8511"}}>Under-scanned · {under.length} SKU{under.length!==1?"s":""}</div>
            </div>
            <div style={{font:"500 12px/1.4 var(--font-display)",color:"#2B2B2E",marginBottom:10}}>Below 90% threshold. You can still proceed.</div>
            {under.map(r=>(
              <div key={r.sku.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",background:"#fff",borderRadius:6,marginTop:4,font:"500 12px/1 var(--font-display)"}}>
                <span style={{fontWeight:700}}>{r.sku.name}</span><span style={{color:"#EE8511"}}>{r.sc} / {r.alloc.plan} {r.sku.uom}</span>
              </div>
            ))}
          </div>
        )}
        {ready&&<Banner kind="ok" title="All SKUs complete" body={`${rows.length} SKUs at or above plan.`}/>}

        <div style={{font:"700 11px/1 var(--font-display)",color:"#62666A",letterSpacing:".08em",textTransform:"uppercase",marginTop:20,marginBottom:8}}>Summary · {rows.length} SKUs</div>
        {rows.map(r=>{
          const st=isSubmitted(live,r.sku.id,hubId)?"submitted":hubStatus(live,r.sku.id,hubId);
          return(
            <div key={r.sku.id} className="card" style={{padding:"10px 12px",marginBottom:6,display:"flex",alignItems:"center",gap:10}}>
              <div style={{flex:1}}>
                <div style={{font:"700 13px/1.2 var(--font-display)",color:"#0D0D0E"}}>{r.sku.name}</div>
                <div style={{font:"500 11px/1.3 var(--font-display)",color:"#62666A",marginTop:2}}>
                  <strong style={{color:r.sc>r.alloc.plan?"#D11243":"#2B2B2E"}}>{r.sku.uom==="kg"?r.sc.toFixed(1):r.sc}</strong> / {r.alloc.plan} {r.sku.uom}
                </div>
              </div>
              <StatusFlag status={st}/>
            </div>
          );
        })}
      </div>
      <div className="action">
        <button className="btn btn-secondary" onClick={()=>go("home")} style={{flex:"none",padding:"0 18px"}}>Back</button>
        <button className="btn btn-primary" onClick={doSubmit}>Submit {hub.label}</button>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────
   OUTWARD SUBMIT
───────────────────────────────────────── */
function OutwardSubmitScreen({go,live,commitScan}){
  const hubRows=DATA.HUBS.map(h=>{
    const skus   =DATA.SKUS.filter(s=>s.hubs.some(hh=>hh.id===h.id&&hh.plan>0));
    const plan   =+skus.reduce((a,s)=>a+(s.hubs.find(hh=>hh.id===h.id)?.plan||0),0).toFixed(1);
    const sc     =+skus.reduce((a,s)=>a+liveHubScanned(live,s.id,h.id),0).toFixed(1);
    const allSub =skus.every(s=>isSubmitted(live,s.id,h.id));
    const status =allSub?"submitted":sc>=plan&&plan>0?"complete":sc>0?"progress":"pending";
    return {hub:h,plan,sc,skuCount:skus.length,status};
  });

  const allHubsDone=hubRows.every(r=>r.status==="submitted"||r.status==="complete");

  function doSubmit(){
    // Mark any remaining as submitted at their current scanned values
    DATA.HUBS.forEach(h=>{
      DATA.SKUS.filter(s=>s.hubs.some(hh=>hh.id===h.id&&hh.plan>0)).forEach(s=>{
        if(!isSubmitted(live,s.id,h.id)) commitScan(s.id,h.id,liveHubScanned(live,s.id,h.id),true);
      });
    });
    go("submitted");
  }

  return(
    <div className="screen">
      <StatusBar theme="light"/>
      <AppBar title="Submit Outward" onBack={()=>go("home")}/>
      <div className="body light" style={{padding:"14px 16px"}}>
        <div style={{font:"800 22px/1.3 var(--font-display)",color:"#0D0D0E"}}>SH Outward · 14 May</div>
        <div style={{font:"500 13px/1.5 var(--font-display)",color:"#62666A",marginTop:4}}>{hubRows.length} destination hubs · {DATA.SKUS.length} SKUs</div>
        <div style={{display:"inline-flex",alignItems:"center",gap:6,padding:"5px 10px",background:"#FDF3F6",borderRadius:6,marginTop:8,font:"700 11px/1 var(--font-display)",color:"#D11243"}}>
          <ICrown style={{width:14,height:14}}/> Supervisor action
        </div>

        {!allHubsDone&&<Banner kind="warn" title={`${hubRows.filter(r=>r.status==="pending"||r.status==="progress").length} hubs still in progress`} body="Submit each hub first (Home → tap hub chip → Submit hub), then submit the outward."/>}
        {allHubsDone &&<Banner kind="ok"   title="All hubs locked" body="Ready to submit the final outward."/>}

        <div style={{font:"700 11px/1 var(--font-display)",color:"#62666A",letterSpacing:".08em",textTransform:"uppercase",marginTop:14,marginBottom:8}}>By destination hub</div>
        {hubRows.map(r=>(
          <div key={r.hub.id} className="card" style={{padding:"12px 14px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{font:"700 14px/1.2 var(--font-display)",color:"#0D0D0E"}}>{r.hub.label}</div>
              <div style={{font:"500 11px/1.3 var(--font-display)",color:"#62666A",marginTop:2}}>{r.skuCount} SKUs · {r.sc} / {r.plan}</div></div>
              <StatusFlag status={r.status}/>
            </div>
            <div className="progress" style={{marginTop:10}}>
              <div className={r.status==="submitted"||r.status==="complete"?"ok":"warn"} style={{width:`${Math.min(100,r.plan>0?(r.sc/r.plan)*100:0)}%`}}/>
            </div>
          </div>
        ))}
      </div>
      <div className="action">
        <button className="btn btn-secondary" onClick={()=>go("home")} style={{flex:"none",padding:"0 18px"}}>Back</button>
        <button className="btn btn-primary" onClick={doSubmit}>Submit Outward</button>
      </div>
    </div>
  );
}

function App(){
  const [active,   setActive]  =useState("login");
  const [user,     setUser]    =useState({loggedIn:false});
  const [state,    setState]   =useState({cat:"all",hub:"all",sku:null});
  // ── Live scan state: { 'skuId:hubId': { scanned:number, submitted:bool } }
  const [live,     setLive]    =useState({});

  // Commit a scan result (or save progress mid-session)
  const commitScan=useCallback((skuId,hubId,scanned,submitted)=>{
    setLive(prev=>({...prev,[hubKey(skuId,hubId)]:{scanned:+scanned,submitted:!!submitted}}));
  },[]);

  // Pre-fill state when jumping via nav strip
  useEffect(()=>{
    if(active==="hubSubmit"&&(state.hub==="all"))setState(s=>({...s,hub:DATA.HUBS[0].id}));
    if(active==="skuDetail"&&!state.sku)         setState(s=>({...s,sku:DATA.SKUS[0].id}));
    if(active==="scanFree"||active==="scanFixed"){
      setState(s=>{
        const n={...s};
        if(!n.sku)n.sku=active==="scanFree"?"sku-ckn-cc":"sku-ckn-wg";
        if(!n.hub||n.hub==="all")n.hub="aecs";
        return n;
      });
    }
    if(active==="hubDone"&&!state.lastHub){
      setState(s=>({...s,lastHub:"aecs",lastScanned:18.4,lastPlan:24.0,lastUom:"kg",lastSkuName:"Chicken Whole Curry Cut"}));
    }
  },[active]);

  // Build nav strip
  useEffect(()=>{
    const nav=document.getElementById("nav");
    nav.innerHTML="";
    FLOWS.forEach(flow=>{
      const grp=document.createElement("div");grp.className="group";
      const lbl=document.createElement("div");lbl.className="group-label";lbl.textContent=flow.group;
      grp.appendChild(lbl);
      flow.screens.forEach(s=>{
        const b=document.createElement("button");
        b.textContent=s.label;b.className=s.id===active?"active":"";b.onclick=()=>setActive(s.id);
        grp.appendChild(b);
      });
      nav.appendChild(grp);
    });
  },[active]);

  const item=ALL.find(s=>s.id===active)||ALL[0];
  const props={go:setActive,state,setState,user,setUser,live,commitScan};

  return(
    <div className="kit-shell">
      <div className="kit-viewport">
        {item.C(props)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
